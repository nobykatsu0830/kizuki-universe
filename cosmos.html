<style>

</style></head>

": "三家庭よもぎ村", "body": "私も同感です！そんな男になりたい！", "source": "web", "tags": ["つながり", "自己理解"], "star_kind": "insight", "visibility": "universe", "constellation_id": "c1d2f5d0d86c", "constellation_name": "自己理解の星座", "lat": 32, "lon": 108}];
